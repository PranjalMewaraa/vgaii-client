# Docker Compose for the VGAII CRM (Next.js standalone) against an EXTERNAL DB.
#
# Two services:
#   migrate  — runs `prisma migrate deploy` (+ optional seed) once, then exits.
#   web      — the standalone Next.js server (node server.js). Starts only after
#              migrate completes successfully.
#
# The standalone runtime image has no Prisma CLI, so migrations run in `migrate`
# (built from the `builder` stage, which has the full toolchain).
#
# Provide secrets via the stack's Environment variables in Portainer (NOT this
# public repo):
#   DATABASE_URL   e.g. mysql://user:pass@host:3306/dbname   (required)
#   JWT_SECRET     long random string                        (required)
#   SEED_ON_START  set "true" once on a fresh DB to seed     (optional)
#   WEB_PORT       host port (default 4000)                  (optional)

services:
  migrate:
    build:
      context: .
      target: builder
    command: >
      sh -c "npx prisma migrate deploy &&
             if [ \"$$SEED_ON_START\" = \"true\" ]; then npm run seed; fi"
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in the stack environment}
      SEED_ON_START: ${SEED_ON_START:-false}
    restart: "no"
    networks:
      - appnet

  web:
    build:
      context: .
      args:
        # Build-time only (inlined into the client bundle by Next).
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
    container_name: vgaii-web
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      # host:container — app listens on 3000 inside; published on 4000.
      # Override WEB_PORT in Portainer's env to change the host port.
      - "${WEB_PORT:-4000}:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in the stack environment}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in the stack environment}

      # ─── Optional integrations (leave blank if unused) ──────────────────
      DATAFORSEO_LOGIN: ${DATAFORSEO_LOGIN:-}
      DATAFORSEO_PASSWORD: ${DATAFORSEO_PASSWORD:-}
      SUBSCRIPTION_CHECK_URL: ${SUBSCRIPTION_CHECK_URL:-}
      SUBSCRIPTION_X_CRM_KEY: ${SUBSCRIPTION_X_CRM_KEY:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_MAX_UPLOAD_BYTES: ${R2_MAX_UPLOAD_BYTES:-}
      CRON_SECRET: ${CRON_SECRET:-}
    networks:
      - appnet

networks:
  appnet:
